<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Registry — Sepolia</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: monospace; background:#fff; color:#111; }

header {
  border-bottom: 2px solid #111;
  padding: 14px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-size:16px; font-weight:bold; }
.logo span { color:#999; font-weight:normal; }

.connect-btn {
  border:1.5px solid #111; padding:7px 14px;
  background:#fff; cursor:pointer;
  font-family:monospace; font-size:12px; font-weight:bold;
}
.connect-btn:hover { background:#111; color:#fff; }

.w-on {
  display:flex; align-items:center; gap:6px;
  border:1.5px solid #111; padding:6px 12px;
  background:#111; color:#fff; font-family:monospace; font-size:12px;
}
.dot { width:7px; height:7px; background:#4caf50; border-radius:50%; }
.w-on img { width:16px; height:16px; object-fit:contain; }
.dis { background:none; border:none; color:#888; cursor:pointer; font-size:12px; margin-left:2px; }
.dis:hover { color:#fff; }

/* modal */
.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99; align-items:center; justify-content:center; }
.ov.on { display:flex; }
.modal { background:#fff; border:2px solid #111; padding:22px; width:260px; }
.modal h3 { font-size:12px; font-weight:bold; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
.wopt {
  display:flex; align-items:center; gap:10px;
  padding:10px; border:1.5px solid #ddd;
  cursor:pointer; margin-bottom:8px; font-family:monospace; font-size:13px;
}
.wopt:hover { border-color:#111; }
.wopt img { width:22px; height:22px; object-fit:contain; }
.can { width:100%; padding:9px; margin-top:2px; border:1.5px solid #111; background:#fff; cursor:pointer; font-family:monospace; font-size:12px; }
.can:hover { background:#111; color:#fff; }

/* inline error banner */
.err-banner {
  display:none; background:#fff3f3; border:1.5px solid #e53935;
  padding:10px 14px; font-size:12px; color:#c62828;
  margin:0 18px; margin-top:12px;
}
.err-banner.on { display:flex; align-items:center; justify-content:space-between; }
.err-banner button { background:none; border:none; color:#c62828; cursor:pointer; font-size:14px; }

main { max-width:500px; margin:0 auto; padding:24px 18px; }

.ntag {
  display:inline-flex; align-items:center; gap:5px;
  border:1px solid #ccc; padding:3px 9px;
  font-size:11px; color:#666; margin-bottom:22px;
}
.ndot { width:6px; height:6px; background:#4caf50; border-radius:50%; }

h1 { font-size:20px; margin-bottom:4px; }
.sub { font-size:12px; color:#999; margin-bottom:26px; }

.searchbar { display:flex; border:2px solid #111; margin-bottom:10px; }
.searchbar input { flex:1; border:none; padding:11px 13px; font-family:monospace; font-size:14px; outline:none; }
.searchbar input::placeholder { color:#ccc; }
.searchbar button { border:none; border-left:2px solid #111; background:#111; color:#fff; padding:0 16px; cursor:pointer; font-family:monospace; font-size:13px; font-weight:bold; }
.searchbar button:hover { background:#333; }

.spin { display:none; font-size:11px; color:#999; margin-bottom:10px; }
.spin.on { display:block; }

/* result card */
.card { border:1.5px solid #111; padding:16px; margin-bottom:10px; display:none; }
.card.on { display:block; }
.card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.dname { font-size:15px; font-weight:bold; }
.badge { font-size:10px; font-weight:bold; padding:3px 8px; border:1px solid; letter-spacing:1px; text-transform:uppercase; }
.badge.av { border-color:#4caf50; color:#2e7d32; }
.badge.tk { border-color:#999; color:#777; }

.card-row { display:flex; justify-content:space-between; font-size:11px; padding:5px 0; border-bottom:1px solid #f0f0f0; }
.card-row:last-of-type { border-bottom:none; }
.cl { color:#999; }
.cv { font-weight:bold; word-break:break-all; max-width:60%; text-align:right; }

.reg-btn { width:100%; margin-top:12px; padding:10px; border:1.5px solid #111; background:#111; color:#fff; cursor:pointer; font-family:monospace; font-size:13px; font-weight:bold; }
.reg-btn:hover { background:#333; }
.reg-btn:disabled { background:#ccc; border-color:#ccc; cursor:not-allowed; }

/* wallet required hint */
.wallet-hint { font-size:11px; color:#999; margin-top:8px; text-align:center; }

.msg { display:none; padding:9px 12px; border:1.5px solid; font-size:12px; margin-top:8px; }
.msg.on { display:block; }
.msg.ok { border-color:#4caf50; color:#2e7d32; }
.msg.err { border-color:#e53935; color:#c62828; }
.msg.inf { border-color:#111; color:#111; }

/* my domains */
.sec-title { font-size:10px; font-weight:bold; letter-spacing:2px; text-transform:uppercase; color:#aaa; border-bottom:1px solid #eee; padding-bottom:6px; margin-bottom:12px; margin-top:28px; }
.my-btn { width:100%; padding:9px; border:1.5px solid #111; background:#fff; cursor:pointer; font-family:monospace; font-size:12px; }
.my-btn:hover { background:#f5f5f5; }
.my-btn:disabled { color:#ccc; border-color:#ddd; cursor:not-allowed; }
.dlist { margin-top:10px; display:none; }
.dlist.on { display:block; }
.ditem { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:12px; }
.ditem:last-child { border-bottom:none; }
.ditem-name { font-weight:bold; }
.ditem-n { color:#bbb; font-size:11px; }

footer { border-top:1px solid #eee; padding:12px 18px; text-align:center; font-size:11px; color:#ccc; margin-top:20px; }
footer a { color:#aaa; text-decoration:none; }
footer a:hover { text-decoration:underline; }
</style>
</head>
<body>

<header>
  <div class="logo">domains<span>.eth</span></div>
  <div id="wArea">
    <button class="connect-btn" onclick="openModal()">Connect Wallet</button>
  </div>
</header>

<div class="err-banner" id="errBanner">
  <span id="errText"></span>
  <button onclick="closeErr()">✕</button>
</div>

<!-- Wallet Modal -->
<div class="ov" id="ov">
  <div class="modal">
    <h3>Select Wallet</h3>
    <div class="wopt" onclick="connect('metamask')">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask">
      MetaMask
    </div>
    <div class="wopt" onclick="connect('rabby')">
      <img
        src="https://cdn.jsdelivr.net/gh/rabbykit/rabby-static/dist/images/rabby-logo.png"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22%3E%3Crect width=%2240%22 height=%2240%22 rx=%228%22 fill=%22%237c3aed%22/%3E%3Ctext x=%2250%25%22 y=%2256%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2220%22 font-family=%22monospace%22%3ER%3C/text%3E%3C/svg%3E'"
        alt="Rabby">
      Rabby Wallet
    </div>
    <button class="can" onclick="closeModal()">Cancel</button>
  </div>
</div>

<main>
  <div class="ntag"><span class="ndot"></span>Sepolia Testnet</div>
  <h1>Find your domain</h1>
  <p class="sub">Register .eth domains on Sepolia Testnet</p>

  <div class="searchbar">
    <input id="sInput" placeholder="Search for a name" onkeydown="if(event.key==='Enter')searchDomain()" />
    <button onclick="searchDomain()">Search</button>
  </div>
  <div class="spin" id="searchSpin">⏳ Searching...</div>

  <div class="card" id="card">
    <div class="card-top">
      <span class="dname" id="cardName"></span>
      <span class="badge" id="cardBadge"></span>
    </div>
    <div id="cardDetails"></div>
    <button class="reg-btn" id="cardRegBtn" onclick="registerFromCard()" style="display:none">Register</button>
    <div class="wallet-hint" id="walletHint" style="display:none">Connect wallet to register</div>
    <div class="spin" id="regSpin">⏳ Processing transaction...</div>
    <div class="msg" id="regMsg"></div>
  </div>

  <div class="sec-title">My Domains</div>
  <button class="my-btn" id="myBtn" onclick="loadMyDomains()" disabled>Load My Domains</button>
  <div class="spin" id="mySpin">⏳ Loading...</div>
  <div class="dlist" id="dList"></div>
</main>

<footer>
  <a href="https://sepolia.etherscan.io/address/0xb1a35954c4047E26EcA526E2098b8c97993eF66b" target="_blank">View Contract on Etherscan</a>
</footer>

<script>
const CA  = "0xb1a35954c4047E26EcA526E2098b8c97993eF66b";
const ABI = [
  "function registerDomain(string,string) external",
  "function getDomain(string) external view returns (address,string,uint256,uint256,bool)",
  "function getOwnerDomains(address) external view returns (string[])",
  "function isDomainTaken(string) public view returns (bool)"
];

// ── FIX 1: Multiple fallback RPCs for Sepolia ──────────────────────────────
const SEPOLIA_RPCS = [
  "https://ethereum-sepolia-rpc.publicnode.com",
  "https://rpc2.sepolia.org",
  "https://sepolia.drpc.org"
];
const SEPOLIA_CHAIN_ID = 11155111;

let provider, signer, contract, myAddr, currentDomain = '';

// ── FIX 2: Always use a reliable read-only provider (not wallet provider) ──
function getReadProvider() {
  // Always use a dedicated JsonRpcProvider for READ calls
  // This avoids using the wallet's Web3Provider which may be on wrong network
  return new ethers.providers.FallbackProvider(
    SEPOLIA_RPCS.map((url, i) => ({
      provider: new ethers.providers.JsonRpcProvider(url),
      priority: i + 1,
      stallTimeout: 2000,
      weight: 1
    })),
    1 // quorum = 1 (first to respond wins)
  );
}

function openModal() { document.getElementById('ov').classList.add('on'); }
function closeModal() { document.getElementById('ov').classList.remove('on'); }

function showErr(msg) {
  document.getElementById('errText').textContent = msg;
  document.getElementById('errBanner').classList.add('on');
}
function closeErr() { document.getElementById('errBanner').classList.remove('on'); }

function spin(id, on) { document.getElementById(id).className = 'spin' + (on ? ' on' : ''); }
function setMsg(id, txt, cls) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.className = 'msg on ' + cls;
}

// ── FIX 3: Switch to Sepolia before connecting ─────────────────────────────
async function switchToSepolia() {
  try {
    await window.ethereum.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: '0x' + SEPOLIA_CHAIN_ID.toString(16) }]
    });
  } catch (switchErr) {
    // Chain not added yet — add it
    if (switchErr.code === 4902) {
      await window.ethereum.request({
        method: 'wallet_addEthereumChain',
        params: [{
          chainId: '0x' + SEPOLIA_CHAIN_ID.toString(16),
          chainName: 'Sepolia Testnet',
          nativeCurrency: { name: 'SepoliaETH', symbol: 'ETH', decimals: 18 },
          rpcUrls: SEPOLIA_RPCS,
          blockExplorerUrls: ['https://sepolia.etherscan.io']
        }]
      });
    } else {
      throw switchErr;
    }
  }
}

async function connect(type) {
  closeModal();
  closeErr();

  if (!window.ethereum) {
    showErr('No wallet detected. Please install MetaMask or Rabby extension first.');
    return;
  }

  try {
    // FIX 4: Switch network BEFORE requesting accounts
    await switchToSepolia();

    await window.ethereum.request({ method: 'eth_requestAccounts' });
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer   = provider.getSigner();
    myAddr   = await signer.getAddress();

    // FIX 5: Verify we're actually on Sepolia after connecting
    const network = await provider.getNetwork();
    if (network.chainId !== SEPOLIA_CHAIN_ID) {
      showErr('Wrong network detected. Please switch to Sepolia Testnet.');
      provider = signer = myAddr = null;
      return;
    }

    contract = new ethers.Contract(CA, ABI, signer);

    const short = myAddr.slice(0,6) + '...' + myAddr.slice(-4);
    const mmSrc = 'https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg';
    const rSrc  = 'https://cdn.jsdelivr.net/gh/rabbykit/rabby-static/dist/images/rabby-logo.png';
    const rFall = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='8' fill='%237c3aed'/%3E%3Ctext x='50%25' y='56%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-family='monospace'%3ER%3C/text%3E%3C/svg%3E";
    const imgHtml = type === 'metamask'
      ? `<img src="${mmSrc}">`
      : `<img src="${rSrc}" onerror="this.src='${rFall}'">`;

    document.getElementById('wArea').innerHTML = `
      <div class="w-on">
        <span class="dot"></span>${imgHtml}&nbsp;${short}
        <button class="dis" onclick="disconnect()" title="Disconnect">✕</button>
      </div>`;

    document.getElementById('myBtn').disabled = false;

    // Update register button if card already showing
    const rb = document.getElementById('cardRegBtn');
    const wh = document.getElementById('walletHint');
    if (rb.style.display !== 'none' || wh.style.display !== 'none') {
      rb.style.display = 'block'; rb.disabled = false;
      wh.style.display = 'none';
    }

    window.ethereum.on('accountsChanged', () => location.reload());
    window.ethereum.on('chainChanged',    () => location.reload());

  } catch(e) {
    if (e.code === 4001) {
      showErr('Connection rejected by user.');
    } else {
      showErr('Connection failed: ' + (e.message || 'Unknown error'));
    }
  }
}

function disconnect() {
  provider = signer = contract = myAddr = null;
  document.getElementById('wArea').innerHTML = `<button class="connect-btn" onclick="openModal()">Connect Wallet</button>`;
  document.getElementById('myBtn').disabled = true;
  document.getElementById('dList').className = 'dlist';
}

async function searchDomain() {
  const val = document.getElementById('sInput').value.trim().toLowerCase().replace(/\.eth$/, '');
  if (!val) return;
  currentDomain = val;
  closeErr();
  document.getElementById('card').classList.remove('on');
  document.getElementById('regMsg').className = 'msg';
  spin('searchSpin', true);

  try {
    // FIX 6: ALWAYS use the dedicated read provider for search
    // Never use wallet provider (Web3Provider) for read calls
    const readProvider = getReadProvider();
    const rc = new ethers.Contract(CA, ABI, readProvider);

    const taken = await rc.isDomainTaken(val);

    document.getElementById('cardName').textContent = val + '.eth';
    const badge   = document.getElementById('cardBadge');
    const rb      = document.getElementById('cardRegBtn');
    const wh      = document.getElementById('walletHint');
    const details = document.getElementById('cardDetails');

    if (!taken) {
      badge.textContent = 'Available';
      badge.className   = 'badge av';
      details.innerHTML = '<div style="font-size:12px;color:#999;padding:4px 0 8px;">This name is available to register.</div>';
      rb.textContent    = 'Register ' + val + '.eth';
      if (myAddr) {
        rb.style.display = 'block'; rb.disabled = false;
        wh.style.display = 'none';
      } else {
        rb.style.display = 'none';
        wh.style.display = 'block';
      }
    } else {
      const d = await rc.getDomain(val);
      badge.textContent = 'Registered';
      badge.className   = 'badge tk';
      const exp = new Date(d[3].toNumber() * 1000).toLocaleDateString();
      details.innerHTML = `
        <div class="card-row"><span class="cl">Owner</span><span class="cv">${d[0].slice(0,8)}...${d[0].slice(-6)}</span></div>
        <div class="card-row"><span class="cl">Expires</span><span class="cv">${exp}</span></div>
        <div class="card-row"><span class="cl">Status</span><span class="cv" style="color:${d[4]?'#2e7d32':'#c62828'}">${d[4]?'Active':'Expired'}</span></div>`;
      rb.style.display = 'none';
      wh.style.display = 'none';
    }

    document.getElementById('card').classList.add('on');

  } catch(e) {
    // FIX 7: Better error messaging
    let errMsg = 'Search failed.';
    if (e.code === 'CALL_EXCEPTION') {
      errMsg = 'Contract not found on Sepolia. Check the contract address or try again.';
    } else if (e.code === 'NETWORK_ERROR' || e.message?.includes('network')) {
      errMsg = 'Network error. Check your internet connection and try again.';
    } else {
      errMsg = 'Search failed: ' + (e.reason || e.message || 'Unknown error');
    }
    showErr(errMsg);
  }

  spin('searchSpin', false);
}

async function registerFromCard() {
  if (!contract || !myAddr) {
    showErr('Please connect your wallet first.');
    return;
  }

  // FIX 8: Verify network before sending transaction
  try {
    const network = await provider.getNetwork();
    if (network.chainId !== SEPOLIA_CHAIN_ID) {
      showErr('Wrong network. Please switch to Sepolia Testnet and try again.');
      await switchToSepolia();
      return;
    }
  } catch(e) {
    showErr('Could not verify network. Please reconnect your wallet.');
    return;
  }

  const rb = document.getElementById('cardRegBtn');
  rb.disabled = true;
  spin('regSpin', true);
  document.getElementById('regMsg').className = 'msg';

  try {
    const tx = await contract.registerDomain(currentDomain, '');
    setMsg('regMsg', 'Tx sent: ' + tx.hash.slice(0,20) + '...', 'inf');
    await tx.wait();
    setMsg('regMsg', '✓ "' + currentDomain + '.eth" registered successfully!', 'ok');
    await searchDomain();
  } catch(e) {
    let errMsg = e.reason || e.message || 'Transaction failed';
    if (e.code === 4001) errMsg = 'Transaction rejected by user.';
    setMsg('regMsg', '✗ ' + errMsg, 'err');
    rb.disabled = false;
  }

  spin('regSpin', false);
}

async function loadMyDomains() {
  if (!contract || !myAddr) return;
  spin('mySpin', true);
  document.getElementById('dList').className = 'dlist';

  try {
    // FIX 9: Use read provider for fetching domains too
    const readProvider = getReadProvider();
    const rc   = new ethers.Contract(CA, ABI, readProvider);
    const list = await rc.getOwnerDomains(myAddr);
    const box  = document.getElementById('dList');

    if (!list.length) {
      box.innerHTML = '<div style="font-size:12px;color:#bbb;padding:10px 0;">No domains registered yet.</div>';
    } else {
      box.innerHTML = list.map((d, i) => `
        <div class="ditem">
          <span class="ditem-name">${d}.eth</span>
          <span class="ditem-n">#${i+1}</span>
        </div>`).join('');
    }
    box.classList.add('on');

  } catch(e) {
    const box = document.getElementById('dList');
    box.innerHTML = '<div style="font-size:12px;color:#c62828;">Failed to load domains: ' + (e.reason || e.message || 'Unknown error') + '</div>';
    box.classList.add('on');
  }

  spin('mySpin', false);
}
</script>
</body>
</html>
